name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Quick Test
        run: make test

      - name: Python Test Suite
        run: make pytest

      - name: Benchmark
        run: make benchmark
